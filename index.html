    <title>ATRI Memories | 幸福的足迹</title>
    <style>
      #boot-intro {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: grid;
        place-items: center;
        background-color: #e8f8ff;
        background-image: 
          radial-gradient(rgba(16, 30, 44, 0.08) 15%, transparent 16%),
          radial-gradient(rgba(16, 30, 44, 0.08) 15%, transparent 16%);
        background-size: 16px 16px;
        background-position: 0 0, 8px 8px;
        transition: opacity 350ms ease-out, visibility 350ms linear;
      }

      #boot-intro.is-hiding {
        opacity: 0;
        visibility: hidden;
      }

      .boot-intro-mark {
        display: grid;
        justify-items: center;
        gap: 16px;
        width: min(350px, calc(100vw - 48px));
        border: 3px solid #101e2c;
        border-radius: 12px;
        padding: 36px 28px;
        background: #ffffff;
        box-shadow: 6px 6px 0px #101e2c;
        position: relative;
        transform: rotate(1deg);
        animation: intro-bounce 450ms cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      }

      @keyframes intro-bounce {
        from {
          transform: scale(0.9) rotate(-3deg);
          opacity: 0;
        }
        to {
          transform: scale(1) rotate(1deg);
          opacity: 1;
        }
      }

      .boot-intro-mark span {
        color: #101e2c;
        background: #ffca3a;
        border: 2.5px solid #101e2c;
        border-radius: 4px;
        padding: 4px 10px;
        font-size: 0.74rem;
        font-weight: 800;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        transform: rotate(-3deg) translateY(-8px);
        box-shadow: 2px 2px 0px #101e2c;
        font-family: "Outfit", sans-serif;
      }

      .boot-intro-mark strong {
        font-family: "Outfit", "Inter", "Noto Serif SC", serif;
        font-size: clamp(3.6rem, 10vw, 4.8rem);
        font-weight: 900;
        letter-spacing: 0.08em;
        line-height: 1;
        color: #101e2c;
        text-shadow:
          3px 3px 0px #00e5ff,
          6px 6px 0px #101e2c;
        margin: 4px 0 8px;
      }

      .boot-intro-mark i {
        width: 100%;
        height: 10px;
        border-radius: 4px;
        border: 2.5px solid #101e2c;
        background: #ffffff;
        position: relative;
        overflow: hidden;
      }

      .boot-intro-mark i::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0%;
        background: #ff5e7e;
        animation: boot-progress 1200ms cubic-bezier(0.65, 0, 0.35, 1) forwards;
      }

      @keyframes boot-progress {
        0% {
          width: 0%;
        }
        100% {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-intro" aria-hidden="true">
      <div class="boot-intro-mark">
        <span>ATRI MEMORIES</span>
        <strong>ATRI</strong>
        <i></i>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
